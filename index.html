<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpaceX Launch Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Solarized Dark base */
      --bg:              #002b36;   /* base03 */
      --surface:         #073642;   /* base02 */
      --border:          #0e4255;
      --border-active:   #1e5a72;
      --text-primary:    #93a1a1;   /* base1 */
      --text-secondary:  #586e75;   /* base01 */
      --text-dim:        #3a6070;
      --accent:          #b58900;   /* Solarized yellow */
      --accent-light:    #cba020;
      --accent-bright:   #e0bb40;

      /* Heatmap: amber/gold — warm complement to the cool teal base */
      --l0-bg:     #073642;
      --l0-text:   #4a7080;

      --l1-bg:     #291d08;
      --l1-border: #5e4010;
      --l1-text:   #996820;

      --l2-bg:     #372508;
      --l2-border: #7e5818;
      --l2-text:   #c08828;

      --l3-bg:     #452c08;
      --l3-border: #b07018;
      --l3-text:   #d4a030;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 90% 60% at 50% 0%, rgba(181, 137, 0, 0.06), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1360px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 52px;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--accent-light);
      opacity: 0.6;
      margin-bottom: 20px;
    }

    .header-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(24px, 4.5vw, 56px);
      letter-spacing: 0.06em;
      color: #ffffff;
      text-shadow: 0 0 60px rgba(181, 137, 0, 0.2);
      margin-bottom: 36px;
    }

    /* ── ALL-TIME BADGE ── */
    .alltime-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--accent-bright);
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0.8;
    }

    /* ── STATS ── */
    .stats-row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .stat-item {
      padding: 0 28px;
      text-align: center;
      border-right: 1px solid var(--border);
    }

    .stat-item:last-child { border-right: none; }

    .stat-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent-bright);
      letter-spacing: 0.05em;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    /* ── CALENDAR GRID ── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 1040px) { .calendar-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 680px)  { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px)  { .calendar-grid { grid-template-columns: 1fr; } }

    /* ── MONTH CARD ── */
    .month-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .month-card:hover {
      border-color: var(--border-active);
      box-shadow: 0 2px 24px rgba(0, 43, 54, 0.5);
    }

    .month-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .month-launch-count {
      font-size: 9px;
      color: var(--accent-light);
      letter-spacing: 0.08em;
      font-family: 'Share Tech Mono', monospace;
      font-weight: normal;
    }

    /* ── DAY GRID ── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .day-header-cell {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
      padding: 3px 0 5px;
      text-transform: uppercase;
    }

    .day-cell {
      position: relative;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    .day-num {
      font-size: 10px;
      color: var(--text-secondary);
      line-height: 1;
      z-index: 1;
      user-select: none;
    }

    .day-cell.l0 { background: var(--l0-bg); }
    .day-cell.l0 .day-num { color: var(--l0-text); }

    .day-cell.has-launch { cursor: pointer; }
    .day-cell.has-launch:hover { filter: brightness(1.5); }

    .day-cell.l1 { background: var(--l1-bg); }
    .day-cell.l1 .day-num { color: var(--l1-text); }

    .day-cell.l2 { background: var(--l2-bg); }
    .day-cell.l2 .day-num { color: var(--l2-text); }

    .day-cell.l3 { background: var(--l3-bg); }
    .day-cell.l3 .day-num { color: var(--l3-text); }

    .day-cell.today::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid var(--accent-light);
      pointer-events: none;
    }

    .count-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 7px;
      line-height: 1;
      color: var(--accent-bright);
      font-weight: bold;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .legend-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border: 1px solid;
    }

    .legend-item-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    .swatch-0 { background: var(--l0-bg);    border-color: var(--l0-text); }
    .swatch-1 { background: var(--l1-bg);    border-color: var(--l1-border); }
    .swatch-2 { background: var(--l2-bg);    border-color: var(--l2-border); }
    .swatch-3 { background: var(--l3-bg);    border-color: var(--l3-border); }

    /* ── POPOVER ── */
    .popover {
      position: fixed;
      background: #001e28;
      border: 1px solid var(--accent);
      min-width: 220px;
      max-width: 300px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 9999;
      box-shadow: 0 8px 40px rgba(0, 15, 20, 0.8);
      display: none;
    }

    .popover.active { display: block; }

    .popover-header {
      padding: 10px 14px;
      background: rgba(181, 137, 0, 0.1);
      border-bottom: 1px solid var(--border-active);
    }

    .popover-date-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent-bright);
    }

    .popover-mission {
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .popover-mission:last-child { border-bottom: none; }

    .mission-indicator {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .mission-name {
      font-size: 11px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .mission-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .ind-success  { background: #22aa55; }
    .ind-failure  { background: #cc3322; }
    .ind-partial  { background: #cc8822; }
    .ind-upcoming { background: #4488cc; }
    .ind-other    { background: var(--text-secondary); }

    .txt-success  { color: #22aa55; }
    .txt-failure  { color: #cc3322; }
    .txt-partial  { color: #cc8822; }
    .txt-upcoming { color: #4488cc; }
    .txt-other    { color: var(--text-secondary); }

    /* ── LOADING / ERROR ── */
    .state-message {
      text-align: center;
      padding: 80px 20px;
    }

    .state-message-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 0.25em;
      color: var(--text-secondary);
    }

    .data-freshness {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      margin-top: 32px;
      text-transform: uppercase;
    }

    .data-freshness .freshness-date {
      color: var(--accent-light);
    }

    .keyboard-hint {
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-top: 10px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <header class="header">
      <p class="header-eyebrow">Mission Operations Log</p>
      <h1 class="header-title">SpaceX Launch Calendar</h1>

      <p class="alltime-badge">All-Time Aggregated Heatmap</p>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-number" id="stat-total">–</div>
          <div class="stat-label">Total Launches</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="stat-days">–</div>
          <div class="stat-label">Unique Launch Days</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="stat-busiest">–</div>
          <div class="stat-label">Busiest Month</div>
        </div>
      </div>
    </header>

    <main id="calendar-main">
      <div class="state-message">
        <p class="state-message-text">Loading mission data…</p>
      </div>
    </main>

    <div class="legend" id="legend" style="display:none;">
      <span class="legend-label">Launches per day:</span>
      <div class="legend-item">
        <div class="legend-swatch swatch-0"></div>
        <span class="legend-item-label">None</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch swatch-1"></div>
        <span class="legend-item-label">1–2</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch swatch-2"></div>
        <span class="legend-item-label">3–4</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch swatch-3"></div>
        <span class="legend-item-label">5+</span>
      </div>
    </div>

    <p class="data-freshness" id="data-freshness"></p>
    <p class="keyboard-hint">Click a launch day for details &nbsp;·&nbsp; Esc to dismiss</p>
  </div>

  <div class="popover" id="popover"></div>

  <script>
    const CALENDAR_YEAR = new Date().getFullYear();
    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];
    const DOW_ABBR = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

    // Keyed by "MM-DD", value is array of launches across all years
    let launches_by_day = {};
    let popover_open = false;

    function build_launch_map(launch_array) {
      const map = {};
      for (const launch of launch_array) {
        const date = new Date(launch.date);
        const month = String(date.getUTCMonth() + 1).padStart(2, '0');
        const day = String(date.getUTCDate()).padStart(2, '0');
        const key = `${month}-${day}`;
        if (!map[key]) map[key] = [];
        map[key].push(launch);
      }
      return map;
    }

    function days_in_month(year, month_index) {
      return new Date(year, month_index + 1, 0).getDate();
    }

    function first_dow(year, month_index) {
      return new Date(year, month_index, 1).getDay();
    }

    function status_class(status) {
      if (!status) return 'other';
      const lower = status.toLowerCase();
      if (lower === 'success') return 'success';
      if (lower === 'failure') return 'failure';
      if (lower.includes('partial')) return 'partial';
      if (lower.includes('upcoming') || lower.includes('scheduled') || lower === 'go' || lower === 'tbd') return 'upcoming';
      return 'other';
    }

    function render_calendar() {
      const today = new Date();
      const today_month = String(today.getMonth() + 1).padStart(2, '0');
      const today_day = String(today.getDate()).padStart(2, '0');
      const today_key = `${today_month}-${today_day}`;

      let total = 0;
      let launch_days = 0;
      const month_counts = new Array(12).fill(0);

      for (const [key, missions] of Object.entries(launches_by_day)) {
        total += missions.length;
        launch_days++;
        const month_idx = parseInt(key.slice(0, 2), 10) - 1;
        month_counts[month_idx] += missions.length;
      }

      const busiest_idx = month_counts.indexOf(Math.max(...month_counts));
      const busiest_label = total > 0 ? MONTH_NAMES[busiest_idx].slice(0, 3).toUpperCase() : '–';

      document.getElementById('stat-total').textContent = total.toLocaleString();
      document.getElementById('stat-days').textContent = launch_days;
      document.getElementById('stat-busiest').textContent = busiest_label;

      const grid = document.createElement('div');
      grid.className = 'calendar-grid';

      for (let month_index = 0; month_index < 12; month_index++) {
        const count_for_month = month_counts[month_index];
        const count_label = count_for_month > 0
          ? `${count_for_month} launch${count_for_month !== 1 ? 'es' : ''}`
          : '';

        const card = document.createElement('div');
        card.className = 'month-card';

        const month_title = document.createElement('div');
        month_title.className = 'month-title';
        month_title.innerHTML = `
          <span>${MONTH_NAMES[month_index]}</span>
          ${count_label ? `<span class="month-launch-count">${count_label}</span>` : ''}
        `;
        card.appendChild(month_title);

        const day_grid = document.createElement('div');
        day_grid.className = 'day-grid';

        for (const abbr of DOW_ABBR) {
          const header_cell = document.createElement('div');
          header_cell.className = 'day-header-cell';
          header_cell.textContent = abbr;
          day_grid.appendChild(header_cell);
        }

        // Use CALENDAR_YEAR for day-of-week layout only
        const leading_blanks = first_dow(CALENDAR_YEAR, month_index);
        for (let i = 0; i < leading_blanks; i++) {
          const blank = document.createElement('div');
          blank.className = 'day-cell';
          day_grid.appendChild(blank);
        }

        const num_days = days_in_month(CALENDAR_YEAR, month_index);
        for (let day = 1; day <= num_days; day++) {
          const month_str = String(month_index + 1).padStart(2, '0');
          const day_str = String(day).padStart(2, '0');
          const key = `${month_str}-${day_str}`;
          const day_launches = launches_by_day[key] || [];
          const count = day_launches.length;

          const cell = document.createElement('div');
          cell.className = 'day-cell';
          if (count === 0) cell.classList.add('l0');
          else if (count >= 1 && count <= 2) cell.classList.add('l1', 'has-launch');
          else if (count >= 3 && count <= 4) cell.classList.add('l2', 'has-launch');
          else if (count >= 5) cell.classList.add('l3', 'has-launch');
          if (key === today_key) cell.classList.add('today');

          const day_num = document.createElement('div');
          day_num.className = 'day-num';
          day_num.textContent = day;
          cell.appendChild(day_num);

          if (count > 0) {
            const badge = document.createElement('div');
            badge.className = 'count-badge';
            badge.textContent = count;
            cell.appendChild(badge);

            const date_label = `${MONTH_NAMES[month_index]} ${day} — All Time`;
            // Sort launches chronologically for the popover
            const sorted_launches = [...day_launches].sort((a, b) => new Date(a.date) - new Date(b.date));
            cell.addEventListener('click', (event) => {
              event.stopPropagation();
              show_popover(event, sorted_launches, date_label);
            });
          }

          day_grid.appendChild(cell);
        }

        card.appendChild(day_grid);
        grid.appendChild(card);
      }

      const main = document.getElementById('calendar-main');
      main.innerHTML = '';
      main.appendChild(grid);
      document.getElementById('legend').style.display = 'flex';
    }

    function show_popover(event, day_launches, date_label) {
      const popover = document.getElementById('popover');

      const mission_html = day_launches.map(launch => {
        const sc = status_class(launch.status);
        const launch_year = new Date(launch.date).getUTCFullYear();
        return `
          <div class="popover-mission">
            <div class="mission-indicator ind-${sc}"></div>
            <div>
              <div class="mission-name">${launch.name}</div>
              <div class="mission-status txt-${sc}">${launch_year} &middot; ${launch.status || 'Unknown'}</div>
            </div>
          </div>
        `;
      }).join('');

      popover.innerHTML = `
        <div class="popover-header">
          <div class="popover-date-label">${date_label}</div>
        </div>
        ${mission_html}
      `;

      popover.classList.add('active');
      popover_open = true;

      requestAnimationFrame(() => {
        const popup_width = popover.offsetWidth;
        const popup_height = popover.offsetHeight;
        const mouse_x = event.clientX;
        const mouse_y = event.clientY;
        const viewport_width = window.innerWidth;
        const viewport_height = window.innerHeight;

        let left = mouse_x + 12;
        let top = mouse_y - 10;

        if (left + popup_width > viewport_width - 8) left = mouse_x - popup_width - 12;
        if (left < 8) left = 8;
        if (top + popup_height > viewport_height - 8) top = viewport_height - popup_height - 8;
        if (top < 8) top = 8;

        popover.style.left = `${left}px`;
        popover.style.top = `${top}px`;
      });
    }

    function hide_popover() {
      if (popover_open) {
        document.getElementById('popover').classList.remove('active');
        popover_open = false;
      }
    }

    document.addEventListener('click', hide_popover);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') hide_popover();
    });

    function render_freshness(launch_array) {
      const latest = launch_array.reduce((max, launch) =>
        launch.date > max ? launch.date : max, launch_array[0].date
      );
      const latest_date = new Date(latest);
      const formatted = latest_date.toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC'
      });
      const today = new Date();
      const days_ago = Math.floor((today - latest_date) / 86400000);
      const staleness = days_ago === 0 ? 'today'
        : days_ago === 1 ? '1 day ago'
        : `${days_ago} days ago`;
      document.getElementById('data-freshness').innerHTML =
        `Data current through <span class="freshness-date">${formatted}</span> &nbsp;·&nbsp; updated ${staleness}`;
    }

    fetch('./data/launches.json')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(data => {
        launches_by_day = build_launch_map(data);
        render_freshness(data);
        render_calendar();
      })
      .catch(error => {
        document.getElementById('calendar-main').innerHTML = `
          <div class="state-message">
            <p class="state-message-text">Error loading data: ${error.message}</p>
          </div>
        `;
      });
  </script>
</body>
</html>
